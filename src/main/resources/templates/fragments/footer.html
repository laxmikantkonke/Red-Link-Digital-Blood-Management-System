<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <footer th:fragment="footer" class="bg-dark text-light py-5 mt-auto">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-6">
                    <h5 class="fw-bold mb-3">RED<span class="text-danger">-LINK</span></h5>
                    <p class="text-muted mb-0">Connecting blood donors with those in need. Saving lives, one drop at a
                        time.</p>
                </div>
                <div class="col-md-2 col-6">
                    <h5 class="fw-bold mb-3">Company</h5>
                    <ul class="list-unstyled">
                        <li class="mb-2"><a th:href="@{/about}"
                                class="text-decoration-none text-muted hover-white transition">Our Story</a></li>
                        <li class="mb-2"><a th:href="@{/achievements}"
                                class="text-decoration-none text-muted hover-white transition">Success</a></li>
                        <li class="mb-2"><a th:href="@{/blood-info}"
                                class="text-decoration-none text-muted hover-white transition">Education</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h5 class="fw-bold mb-3">Stay Connected</h5>
                    <div class="social-links mb-4">
                        <a href="#" class="text-light me-3 hover-danger transition"><i
                                class="fab fa-facebook-f"></i></a>
                        <a href="#" class="text-light me-3 hover-danger transition"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="text-light me-3 hover-danger transition"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="text-light me-3 hover-danger transition"><i
                                class="fab fa-linkedin-in"></i></a>
                    </div>
                    <p class="mb-0 text-muted"><i class="fas fa-envelope me-2"></i>info@redlink.com</p>
                </div>
            </div>
            <hr class="my-5 opacity-10" style="border-color: rgba(255,255,255,0.1);">
            <div class="row">
                <div class="col-12 text-center text-muted">
                    <p class="small mb-0">&copy; 2025 - 2026 RED-LINK. All rights reserved. Crafted with <i
                            class="fas fa-heart text-danger mx-1"></i> for humanity.</p>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
