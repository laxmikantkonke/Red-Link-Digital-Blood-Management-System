<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/base :: head">
    <title>Login - RED-LINK</title>
</head>

<body class="bg-light">

    <!-- Navigation -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-5">

                        <div class="text-center mb-4">
                            <h2>Login</h2>
                            <p class="text-muted">Welcome back to RED-LINK</p>
                        </div>

                        <!-- ERROR MESSAGE -->
                        <div th:if="${error}" class="alert alert-danger">
                            <span th:text="${error}"></span>
                        </div>

                        <!-- SUCCESS MESSAGE -->
                        <div th:if="${success}" class="alert alert-success">
                            <span th:text="${success}"></span>
                        </div>

                        <!-- 🔴 IMPORTANT FIX APPLIED HERE -->
                        <form th:action="@{/login}" method="post">

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="username" placeholder="Enter your email"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" name="password"
                                    placeholder="Enter your password" required>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-danger">
                                    Login
                                </button>
                            </div>

                            <div class="text-center">
                                <a href="/forgot-password" class="text-decoration-none">
                                    Forgot Password?
                                </a>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2025 - 2026 RED-LINK. All rights reserved.</p>
        </div>
    </footer>

    <!-- Local Bootstrap JS -->
    <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/script.js}"></script>

</body>

</html>
