<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/base :: head">
    <title th:text="${title}">Edit Blood Request - RED-LINK</title>
</head>

<body>
    <!-- Navigation -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <!-- Main Content -->
    <div class="container my-4">
        <!-- Page Header -->
        <div class="row mb-4">
            <div class="col-12">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/blood-requests">Blood Requests</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Edit Request</li>
                    </ol>
                </nav>
                <h1 class="h2">Edit Blood Request</h1>
                <p class="text-muted">Update your blood donation request information</p>
            </div>
        </div>

        <!-- Blood Request Form -->
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card border-0 shadow-lg overflow-hidden">
                    <div class="bg-danger py-2"></div>
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex align-items-center mb-4">
                            <div class="bg-danger p-3 rounded-circle me-3">
                                <i class="fas fa-edit text-white fs-4"></i>
                            </div>
                            <div>
                                <h3 class="fw-bold mb-0">Update Details</h3>
                                <p class="text-muted mb-0">Modify the fields below to update your requirement</p>
                            </div>
                        </div>

                        <form th:action="@{/blood-requests/{id}/edit(id=${bloodRequest.id})}"
                            th:object="${bloodRequest}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="bloodGroup" class="form-label fw-bold">
                                        <i class="fas fa-tint text-danger me-2"></i>Blood Group Required *
                                    </label>
                                    <select class="form-select form-select-lg" id="bloodGroup" th:field="*{bloodGroup}"
                                        required>
                                        <option value="">Select Blood Group</option>
                                        <option th:each="bg : ${bloodGroups}" th:value="${bg}"
                                            th:text="${bg.displayName}">A+</option>
                                    </select>
                                    <div th:if="${#fields.hasErrors('bloodGroup')}" class="text-danger small mt-1">
                                        <i class="fas fa-exclamation-triangle me-1"></i>
                                        <span th:errors="*{bloodGroup}"></span>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="urgencyLevel" class="form-label fw-bold">
                                        <i class="fas fa-clock text-warning me-2"></i>Urgency Level
                                    </label>
                                    <select class="form-select form-select-lg" id="urgencyLevel"
                                        th:field="*{urgencyLevel}">
                                        <option value="NORMAL">Normal</option>
                                        <option value="HIGH">High</option>
                                        <option value="CRITICAL">Critical</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="contact" class="form-label fw-bold">
                                        <i class="fas fa-phone-alt text-primary me-2"></i>Contact Number *
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fas fa-mobile-alt text-muted"></i>
                                        </span>
                                        <input type="tel" class="form-control form-control-lg border-start-0"
                                            id="contact" th:field="*{contact}"
                                            placeholder="Enter 10-digit mobile number" pattern="[6-9][0-9]{9}"
                                            title="Please enter a valid 10-digit mobile number starting with 6-9"
                                            required>
                                    </div>
                                    <div th:if="${#fields.hasErrors('contact')}" class="text-danger small mt-1">
                                        <i class="fas fa-exclamation-triangle me-1"></i>
                                        <span th:errors="*{contact}"></span>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="city" class="form-label fw-bold">
                                        <i class="fas fa-city text-success me-2"></i>City *
                                    </label>
                                    <select class="form-select form-select-lg" id="city" th:field="*{city}" required>
                                        <option value="">Select City</option>
                                        <option th:each="c : ${cities}" th:value="${c}" th:text="${c.displayName}">City
                                        </option>
                                    </select>
                                    <div th:if="${#fields.hasErrors('city')}" class="text-danger small mt-1">
                                        <i class="fas fa-exclamation-triangle me-1"></i>
                                        <span th:errors="*{city}"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="location" class="form-label fw-bold">
                                    <i class="fas fa-map-marker-alt text-info me-2"></i>Location *
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-hospital text-muted"></i>
                                    </span>
                                    <input type="text" class="form-control form-control-lg border-start-0" id="location"
                                        th:field="*{location}"
                                        placeholder="Enter specific location (e.g., hospital name, area)" required>
                                </div>
                                <div th:if="${#fields.hasErrors('location')}" class="text-danger small mt-1">
                                    <i class="fas fa-exclamation-triangle me-1"></i>
                                    <span th:errors="*{location}"></span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="description" class="form-label fw-bold">
                                    <i class="fas fa-notes-medical text-secondary me-2"></i>Description
                                </label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="4"
                                    placeholder="Provide additional details about the blood requirement (optional)"></textarea>
                            </div>

                            <hr class="my-4 opacity-10">

                            <div class="row g-3">
                                <div class="col-md-8">
                                    <button type="submit" class="btn btn-danger btn-lg w-100 shadow-sm">
                                        <i class="fas fa-check-circle me-2"></i>Save Changes
                                    </button>
                                </div>
                                <div class="col-md-4">
                                    <a th:href="@{/blood-requests/{id}(id=${bloodRequest.id})}"
                                        class="btn btn-outline-secondary btn-lg w-100">
                                        Cancel
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2025 - 2026 RED-LINK. All rights reserved.</p>
        </div>
    </footer>

    <!-- Include Scripts -->
    <div th:replace="layout/base :: scripts"></div>
</body>

</html>
